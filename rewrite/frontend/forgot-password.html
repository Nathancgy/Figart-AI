<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - FigArt AI</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="container">
        <!-- Navigation Bar -->
        <header class="navbar">
            <div class="navbar-logo">
                <a href="index.html">FigArt AI</a>
            </div>
            <nav class="navbar-links">
                <a href="community.html" class="nav-link">社区</a>
                <a href="tutorial.html" class="nav-link">教程</a>
                <div class="auth-links" id="authLinks">
                    <!-- Will be populated by JavaScript based on auth status -->
                </div>
            </nav>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <div class="auth-container">
                <div class="auth-card">
                    <div class="auth-header">
                        <h1>忘记密码</h1>
                        <p>请联系管理员重置密码</p>
                    </div>
                    
                    <div id="authError" class="auth-error hidden"></div>
                    <div id="authSuccess" class="alert alert-success hidden"></div>
                    
                    <div class="auth-message">
                        <p>目前我们的密码重置功能尚未完全实现。如果您忘记了密码，请发送邮件至 <a href="mailto:support@figartai.com">support@figartai.com</a> 联系我们的管理员进行密码重置。</p>
                        <p>邮件中请包含您的用户名，我们会尽快处理您的请求。</p>
                    </div>
                    
                    <div class="auth-alt" style="margin-top: 2rem;">
                        <p>记起密码了？ <a href="login.html">返回登录</a></p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-content">
                <div class="footer-links">
                    <a href="privacy.html">隐私政策</a>
                    <a href="terms.html">使用条款</a>
                </div>
                <div class="footer-copyright">
                    &copy; 2024 FigArt AI. All rights reserved.
                </div>
            </div>
        </footer>
    </div>

    <script src="js/auth.js"></script>
    <style>
        .auth-message {
            line-height: 1.6;
            color: var(--text-color);
        }
        
        .auth-message p {
            margin-bottom: 1rem;
        }
        
        .auth-message a {
            font-weight: 500;
        }
    </style>
</body>
</html>
